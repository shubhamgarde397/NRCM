<div class="container">

<div class="container">

    <div>
      <input type="number" id="lrnoSep" placeholder="Seperate LR" [(ngModel)]="lrnoSep" (keyup.enter)="addlrArray()">
      <button (click)="viewQRSeperate()">Download QR Codes!</button>

      <div class="col-sm-3">
    <ul>
      <li *ngFor="let k of bills;let z = index;">
        <button class="btn btn-danger" (click)="delBill(z)">{{k}}</button>
      </li>
    </ul>
  </div>


      <hr>
      <input type="number" [(ngModel)]="lrnoStart" placeholder="LRNO Start">
      <input type="number" [(ngModel)]="lrnoQTY" placeholder="Quantity">
      <button (click)="viewQR()">View and Download QR Codes!</button>
      
      <div class="container" style="display: none;" *ngIf="qrViewer">
        <div class="row" *ngFor="let i of qrcodes;let j = index;">
          <div class="col-sm-1" *ngFor="let ii of i;let jj = index;">
            <qrcode [size]=250 [qrdata]=ii.qrcode id=qrcode_{{j}}_{{jj}} ></qrcode>
            <!-- [elementType]="img" -->
            <h6>{{ii.lrno}}</h6>    
            
          </div>
        </div>
      </div>

    </div>
</div>
</div>

 <!-- [logo]="logoUrl" -->
